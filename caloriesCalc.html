    <html>
    <body style='font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0;'>
      <div style='text-align: center;'>
        <label>Calorie Calculator</label><br>
        <select id='mf'>
          <option value='male'>Male</option>
          <option value='female'>Female</option>
        </select><br>
  
        <input type='number' id='v1' placeholder='Age' style='width: 120px;' oninput='calc()'>
        <br>
        <input type='number' id='v2' placeholder='Weight(lbs)' style='width: 120px;' oninput='calc()'><br>
  
        <label>Work PAL</label>
        <select id='wpal'>
          <option value='low'>Sedentary</option>
          <option value='moderate'>Moderate</option>
          <option value='high'>High</option>
        </select><br>
        <label>Home PAL</label>
        <select id='hpal'>
          <option value='low'>Sedentary</option>
          <option value='moderate'>Moderate</option>
          <option value='high'>High</option>
        </select><br>
        <p style='margin-top: 10px; font-weight: bold;'>Result: <span id='res'>0</span></p>

      </div>
      <script>
        function calc() {
            const mfr = document.getElementById('mf').value;
            const wpal = document.getElementById('wpal').value;
            const hpal = document.getElementById('hpal').value;
            const n1 = document.getElementById('v1').value || 0;
            const n2 = document.getElementById('v2').value || 0;
            let palf;
            //PAL Factor Calculation
            if(wpal=='low') {
                if(hpal=='low'){if(mfr=='male'){palf=1.4}else{palf=1.4}}
                else if(hpal=='moderate'){if(mfr=='male'){palf=1.5}else{palf=1.5}}
                else{if(mfr=='male'){palf=1.6}else{palf=1.6}}}
          document.getElementById('res').innerText = palf;
        }
      </script>
    </body>
    </html>
