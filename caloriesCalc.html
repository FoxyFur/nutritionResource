    <html>
    <body style='font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0;'>
      <div style='text-align: center;'>
        <label>Calorie Calculator</label><br>
        <label>Gender:</label>
        <select id='mf' oninput='calc()'>
          <option value='male'>Male</option>
          <option value='female'>Female</option>
        </select><br>
  
        <label>Work PAL:</label>
        <select id='wpal' oninput='calc()'>
          <option value='low'>Sedentary</option>
          <option value='moderate'>Moderate</option>
          <option value='high'>High</option>
        </select><br>
        <label>Home PAL:</label>
        <select id='hpal' oninput='calc()'>
          <option value='low'>Sedentary</option>
          <option value='moderate'>Moderate</option>
          <option value='high'>High</option>
        </select><br>
        <input type='number' id='v1' placeholder='Age' style='width: 120px;' oninput='calc()'>
        <br>
        <input type='number' id='v2' placeholder='Weight(lbs)' style='width: 120px;' oninput='calc()'><br>
        <p style='margin-top: 10px; font-weight: bold;'>Daily Caloric Needs: <span id='res'>0</span></p>
      </div>
        
      <script>
        function calc() {
            const mfr = document.getElementById('mf').value;
            const wpal = document.getElementById('wpal').value;
            const hpal = document.getElementById('hpal').value;
            const n1 = document.getElementById('v1').value || 0;
            const n2 = document.getElementById('v2').value || 0;
            let palf;
            let weight = n2 * 0.453592;
            let result = 0;
            //PAL Factor Calculation
            if(wpal=='low') {
                if(hpal=='low'){if(mfr=='male'){palf=1.4}else{palf=1.4}}
                else if(hpal=='moderate'){if(mfr=='male'){palf=1.5}else{palf=1.5}}
                else{if(mfr=='male'){palf=1.6}else{palf=1.6}}}
            else if(wpal=='moderate') {
                if(hpal=='low'){if(mfr=='male'){palf=1.6}else{palf=1.5}}
                else if(hpal=='moderate'){if(mfr=='male'){palf=1.7}else{palf=1.6}}
                else{if(mfr=='male'){palf=1.8}else{palf=1.7}}}
            else {
                if(hpal=='low'){if(mfr=='male'){palf=1.7}else{palf=1.5}}
                else if(hpal=='moderate'){if(mfr=='male'){palf=1.8}else{palf=1.6}}
                else{if(mfr=='male'){palf=1.9}else{palf=1.7}}}
            if(mfr=='male') {if(n1<3){result=0.255*weight-0.141}
                             else if(n1>=3 && n1<10) {result=0.0937*weight+2.15}
                             else if(n1>=10 && n1<18) {result=0.0769*weight+2.43}
                             else if(n1>=18 && n1<30) {result=0.0669*weight+2.28}
                             else if(n1>=30 && n1<60) {result=0.0592*weight+2.48}
                             else{result=0.0563*weight+2.15}
                            }
            else {if(n1<3){result=0.246*weight-0.0965}
                             else if(n1>=3 && n1<10) {result=0.0842*weight+2.12}
                             else if(n1>=10 && n1<18) {result=0.0465*weight+3.18}
                             else if(n1>=18 && n1<30) {result=0.0546*weight+2.33}
                             else if(n1>=30 && n1<60) {result=0.0407*weight+2.90}
                             else{result=0.0424*weight+2.38}}
            result = result * 239 * palf;
            document.getElementById('res').innerText = Math.round(result);
        }
      </script>
    </body>
    </html>
